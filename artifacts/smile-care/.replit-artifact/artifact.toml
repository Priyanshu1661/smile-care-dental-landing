kind = "web"
previewPath = "/"
title = "Smile Care Dental Clinic"
version = "1.0.0"
id = "artifacts/smile-care"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23846

[services.development]
run = "pnpm --filter @workspace/smile-care run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smile-care", "run", "build" ]
publicDir = "artifacts/smile-care/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23846"
BASE_PATH = "/"
